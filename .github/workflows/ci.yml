name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra mcp   # light dep; lets tests/test_mcp.py run instead of skip

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Test
        run: uv run pytest tests/ -v
