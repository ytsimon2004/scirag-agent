# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    # Use uv to resolve the docs extra (fast, matches local tooling).
    install:
      - pip install uv
      - uv pip install --system .[docs]

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

formats:
  - pdf
