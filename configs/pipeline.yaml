# Retrieval + graph parameters.
index:
  uri: "data/lancedb"
  table: "scirag"
  chunk_size: 1024
  chunk_overlap: 128

retrieval:
  top_k: 12          # dense candidates
  bm25_k: 12         # sparse candidates
  final_k: 6         # passed to synthesizer after fusion
  hybrid: true       # dense + BM25 reciprocal-rank fusion
  rag_score_threshold: 0.3   # min top score to ground the answer; below this, answer from general knowledge

sources:
  pubmed:
    default_retmax: 10
    # NCBI politeness: <=3 req/s without key, 10 with NCBI_API_KEY in .env
  biorxiv:
    default_retmax: 10
    default_days_back: 360   # keyword search scans this many days back (no keyword API endpoint)
    # bioRxiv API needs no key; client sleeps 0.5s between interval pages
