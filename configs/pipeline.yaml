# Pipeline parameters: how documents are chunked, stored, and retrieved.
# Read at runtime via scirag.config.pipeline_cfg(); a user copy at
# ~/.scirag-agent/configs/pipeline.yaml overrides this one (see config.py).

index:
  # uri: legacy/unused — the actual LanceDB path comes from the active project
  # (scirag.projects.get_active_db_uri), not from here.
  uri: "data/lancedb"
  table: "scirag"          # LanceDB table name (used by ingest + retrieval)
  # Chunking applies at INDEX time only — changing these does not re-chunk
  # already-indexed papers; re-index to take effect.
  chunk_size: 1024         # tokens per chunk fed to the embedder/BM25
  chunk_overlap: 128       # tokens shared between neighbouring chunks (preserves context across cuts)

# Hybrid retrieval (src/scirag/retrieval/retriever.py): two independent searches
# over the indexed chunks, merged by reciprocal-rank fusion (RRF).
retrieval:
  top_k: 30          # dense pass: N most embedding-similar chunks (bge-m3 cosine) — semantic match
  bm25_k: 30         # sparse pass: N top BM25 keyword hits — literal match (acronyms, gene names)
  final_k: 10         # chunks kept after fusion and sent to the synthesizer.
                     #   ^ biggest lever on both answer grounding AND latency:
                     #     more chunks = better recall but a larger prompt to prefill.
  hybrid: true       # true = dense + BM25 fused via RRF; false = dense-only (top_k then final_k)
  rag_score_threshold: 0.3   # grounding gate (applied in agents/pipeline.py): if the best chunk's
                             # raw cosine similarity is below this, drop the sources and answer from
                             # general knowledge instead. Higher = more "no relevant sources"; lower
                             # = grounds on weaker matches. NB: compared to cosine score, NOT the RRF score.
  rerank: false      # OFF by default (opt-in). When true, re-score the fused candidates with a
                     # cross-encoder and keep the best final_k — raises precision (better chunks
                     # survive); retrieve wide (top_k/bm25_k) then rerank. Enable with `/rag rerank on`.
                     # Needs the 'rerank' extra: `uv sync --extra rerank`. First call loads the model
                     # (~600 MB download once); falls back to RRF order if unavailable.
  rerank_model: "BAAI/bge-reranker-v2-m3"   # any sentence-transformers CrossEncoder

# Default fetch sizes for the source clients. NOTE: not currently read by the
# code — the CLI sets these via command flags (--retmax / --days-back); kept here
# as documentation of intended defaults.
sources:
  pubmed:
    default_retmax: 10
    # NCBI politeness: <=3 req/s without key, 10 with NCBI_API_KEY in .env
  biorxiv:
    default_retmax: 10
    default_days_back: 360   # keyword search scans this many days back (no keyword API endpoint)
    # bioRxiv API needs no key; client sleeps 0.5s between interval pages
