# Maps logical agent roles -> backend keys, and backend keys -> concrete models.
# Swap open-source <-> frontier per agent here, no code changes.
# Backend strings are LiteLLM model ids (provider/model).

agents:
  planner: local-qwen3-14b
  retriever: local-qwen3-14b
  synthesizer: local-qwen3-14b
  critic: local-qwen3-14b

backends:
  local-qwen3-14b:
    model: "ollama/qwen3:14b-q4_K_M"          # ~9 GB — hybrid thinking, default
    api_base: "http://localhost:11434"
  local-llama4-scout:
    model: "ollama/llama4:17b-scout-16e-instruct-q4_K_M"  # ~10 GB
    api_base: "http://localhost:11434"
  local-deepseek-r1-32b:
    model: "ollama/deepseek-r1:32b-qwen-distill-q4_K_M"   # ~18 GB — strong reasoning
    api_base: "http://localhost:11434"
  claude-code:
    model: "claude-code"                   # uses `claude -p` subprocess (Plus subscription)
  claude-sonnet:
    model: "anthropic/claude-sonnet-4-6"   # needs ANTHROPIC_API_KEY
  claude-opus:
    model: "anthropic/claude-opus-4-8"
  codex:
    model: "codex"                         # uses `codex` subprocess (OpenAI subscription)
  openai-o3:
    model: "openai/o3"                      # needs OPENAI_API_KEY
  openai-gpt4o:
    model: "openai/gpt-4o"                  # needs OPENAI_API_KEY

# Embeddings run locally via Ollama (Mac) or point api_base at the 4060 box.
embeddings:
  model: "bge-m3"
  api_base: "http://localhost:11434"
  dim: 1024
